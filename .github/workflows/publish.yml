name: Publish

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  build-test-pack:
    name: Build, test, pack, dry-run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build (all workspaces)
        run: npm run build

      - name: Run tests
        run: npm run test

      - name: Build publishable package layout
        run: npm run build:package

      - name: Pack
        working-directory: apps/cli
        run: npm pack

      - name: Upload packed tarball as CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: symbion-tarball
          path: apps/cli/*.tgz

      - name: Dry-run publish validation
        working-directory: apps/cli
        run: npm publish --dry-run

  publish:
    name: Publish to npm registry (manual approval required)
    needs: build-test-pack
    runs-on: ubuntu-latest
    environment:
      name: npm-publish
    steps:
      - name: Download verified tarball
        uses: actions/download-artifact@v4
        with:
          name: symbion-tarball
          path: apps/cli/

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Publish
        working-directory: apps/cli
        run: npm publish *.tgz
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
